[tool.black]
line-length = 100
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["gravitraxconnect"]
src_paths = ["GraviTrax-Connect-Python-Library", "Applications"]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["GraviTrax-Connect-Python-Library", "Applications"]

[tool.ruff.lint]
select = ["E","F","I","W"]
ignore = ["E501"]